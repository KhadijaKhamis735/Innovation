# ==============================
# Application Identity
# ==============================
spring.application.name=Innovation_backend
server.port=8080

# ==============================
# PostgreSQL DataSource
# ==============================
spring.datasource.url=jdbc:postgresql://localhost:5432/innovation
spring.datasource.username=postgres
spring.datasource.password=12345678
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==============================
# Jackson (JSON) Configuration
# ==============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Africa/Dar_es_Salaam

# ==============================
# Multipart (file uploads)
# ==============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==============================
# JWT Configuration
# ==============================
# Change this secret in production! Must be at least 256 bits (32+ chars).
app.jwt.secret=ChangeThisToASecureRandomSecretKeyAtLeast64CharactersLongForHS512Algorithm
app.jwt.expiration-ms=86400000

# ==============================
# CORS (allow React frontend)
# ==============================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ==============================
# Logging
# ==============================
logging.level.org.springframework.security=INFO
logging.level.com.example.Innovation_backend=DEBUG
